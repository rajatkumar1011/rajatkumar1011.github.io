<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PORTFOLIO</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🧑‍💻</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-primary: #fdfdff;
            --bg-secondary: #ffffff;
            --bg-tertiary: #f8fafc;
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --border-color: #e2e8f0;
            --accent-primary: #4f46e5;
            --accent-secondary: #6366f1;
            --header-bg: rgba(253, 253, 255, 0.92);
            --shadow-sm: 0 4px 6px -1px rgba(0, 0, 0, 0.03), 0 2px 4px -2px rgba(0, 0, 0, 0.03);
            --shadow-lg: 0 25px 50px -12px rgb(79 70 229 / 0.18);
            --backdrop-filter: blur(24px);
            --gradient-start: #4f46e5;
            --gradient-end: #a855f7;
            --glow-color: rgba(79, 70, 229, 0.42);
        }

        [data-theme='dark'] {
            --bg-primary: #000000;
            --bg-secondary: #0a0a0a;
            --bg-tertiary: #171717;
            --text-primary: #f8fafc;
            --text-secondary: #a1a1aa;
            --border-color: #262626;
            --accent-primary: #818cf8;
            --accent-secondary: #c084fc;
            --header-bg: rgba(10, 10, 10, 0.88);
            --gradient-start: #818cf8;
            --gradient-end: #f472b6;
            --glow-color: rgba(129, 140, 248, 0.38);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            transition: background-color 0.4s cubic-bezier(0.4, 0, 0.2, 1), color 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            overflow-x: hidden;
            position: relative;
        }

        /* Enhanced multi-layer background glows for more vibe */
        body::before, body::after, body::after ~ .glow-extra {
            content: '';
            position: fixed;
            width: 620px;
            height: 620px;
            border-radius: 50%;
            filter: blur(160px);
            z-index: -1;
            opacity: 0.12;
            pointer-events: none;
        }

        [data-theme='dark'] body::before, [data-theme='dark'] body::after, [data-theme='dark'] body::after ~ .glow-extra {
            opacity: 0.09;
        }

        body::before {
            background: radial-gradient(circle, var(--accent-primary), transparent 65%);
            top: -22%;
            left: -22%;
        }

        body::after {
            background: radial-gradient(circle, var(--accent-secondary), transparent 65%);
            bottom: -22%;
            right: -22%;
            animation: move-glow 24s infinite alternate ease-in-out;
        }

        .glow-extra {
            background: radial-gradient(circle, #a855f7, transparent 70%);
            top: 35%;
            left: 40%;
            width: 420px;
            height: 420px;
            animation: move-glow-extra 18s infinite alternate ease-in-out;
            opacity: 0.07;
        }

        @keyframes move-glow {
            from { transform: translate(0, 0) rotate(0deg); }
            to { transform: translate(120px, 80px) rotate(30deg); }
        }

        @keyframes move-glow-extra {
            from { transform: translate(0, 0) rotate(0deg); }
            to { transform: translate(-80px, 60px) rotate(-25deg); }
        }

        /* Cursor glow - more vibrant in dark mode */
        #cursor-glow {
            display: none;
            position: fixed;
            width: 520px;
            height: 520px;
            border-radius: 50%;
            background: radial-gradient(circle, var(--glow-color) 0%, transparent 55%);
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: -1;
            mix-blend-mode: soft-light;
            transition: width 0.3s ease, height 0.3s ease;
        }

        [data-theme='dark'] #cursor-glow {
            display: block;
        }

        header {
            background-color: var(--header-bg);
            backdrop-filter: var(--backdrop-filter);
            -webkit-backdrop-filter: var(--backdrop-filter);
            border-bottom: 1px solid var(--border-color);
            box-shadow: var(--shadow-sm);
        }

        .header-scrolled {
            box-shadow: var(--shadow-lg);
        }

        /* Glassmorphic glossy cards with deeper depth */
        .card-style {
            background: color-mix(in srgb, var(--bg-secondary) 85%, transparent);
            border: 1px solid color-mix(in srgb, var(--border-color) 60%, transparent);
            backdrop-filter: var(--backdrop-filter);
            -webkit-backdrop-filter: var(--backdrop-filter);
            box-shadow: var(--shadow-sm);
            position: relative;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .card-style:hover {
            transform: translateY(-10px) scale(1.03);
            box-shadow: var(--shadow-lg);
        }
        
        .card-style::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(900px circle at var(--mouse-x) var(--mouse-y), color-mix(in srgb, var(--glow-color) 55%, transparent), transparent 58%);
            opacity: 0;
            transition: opacity 0.5s ease;
            z-index: 0;
            pointer-events: none;
        }
        
        .card-style:hover::before {
            opacity: 1;
        }
        .card-style > * {
            position: relative;
            z-index: 1;
        }

        /* Premium glossy button with stronger shimmer */
        .sleek-btn {
            position: relative;
            overflow: hidden;
            background: linear-gradient(90deg, var(--gradient-start), var(--gradient-end));
            background-size: 200% auto;
            color: #ffffff;
            font-weight: 600;
            border-radius: 9999px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 12px 25px -6px rgb(79 70 229 / 0.45);
        }
        
        .sleek-btn:hover {
            transform: translateY(-4px) scale(1.05);
            background-position: right center;
            box-shadow: 0 22px 35px -8px rgb(79 70 229 / 0.55);
        }
        
        .sleek-btn::after {
            content: '';
            position: absolute;
            top: -60%;
            left: -180%;
            width: 50%;
            height: 300%;
            background: linear-gradient(120deg, transparent, rgba(255,255,255,0.45), transparent);
            transform: skewX(-25deg);
            animation: shimmer 3.5s linear infinite;
        }

        @keyframes shimmer {
            100% { transform: translateX(450%); }
        }

        #user-name {
            background: linear-gradient(90deg, var(--gradient-start), var(--gradient-end));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 12px rgb(79 70 229 / 0.4));
        }

        /* Circular avatar with enhanced glowing ring */
        .avatar-ring {
            position: relative;
        }
        
        .avatar-ring::before {
            content: '';
            position: absolute;
            inset: -8px;
            border-radius: 9999px;
            background: conic-gradient(from var(--angle), transparent 25%, var(--gradient-start), var(--gradient-end), transparent 75%);
            animation: spin 3.5s linear infinite;
            z-index: 0;
            filter: blur(4px) brightness(1.2);
        }

        @property --angle {
          syntax: '<angle>';
          initial-value: 0deg;
          inherits: false;
        }

        @keyframes spin {
          to { --angle: 360deg; }
        }

        #user-avatar {
            box-shadow: 
                0 0 0 6px var(--bg-secondary),
                0 0 0 10px rgb(79 70 229 / 0.15);
            position: relative;
            z-index: 1;
        }

        .reveal-on-scroll {
            opacity: 0;
            transform: translateY(50px);
            transition: all 1s cubic-bezier(0.23, 1, 0.32, 1);
        }
        
        .reveal-on-scroll.is-visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* Extra polish */
        .container {
            max-width: 1280px;
        }
    </style>
</head>
<body class="antialiased">
    
    <div id="cursor-glow"></div>
    <!-- Extra glow layer for more vibe -->
    <div class="glow-extra"></div>

    <!-- Header -->
    <header id="header" class="fixed top-0 left-0 right-0 z-50 transition-all duration-300">
        <nav class="container mx-auto relative flex justify-between items-center px-8 py-6">
            <div>
                <a href="." class="text-3xl font-bold tracking-[-0.05em] bg-gradient-to-r from-[var(--accent-primary)] to-[var(--accent-secondary)] bg-clip-text text-transparent">RK</a>
            </div>
            
            <div class="hidden md:flex absolute top-1/2 left-1/2 [transform:translate(-50%,-50%)] items-center justify-center space-x-10 text-base font-medium">
                <a href="#hero" class="transition-colors hover:text-[var(--accent-secondary)]">About</a>
                <a href="#projects" class="transition-colors hover:text-[var(--accent-secondary)]">Work</a>
                <a href="#contact" class="transition-colors hover:text-[var(--accent-secondary)]">Contact</a>
            </div>

            <div class="flex items-center gap-x-4">
                <button class="theme-toggle" aria-label="Toggle theme">
                    <div class="theme-switch">
                       <div class="theme-switch-thumb">
                            <i data-lucide="sun" class="w-5 h-5 icon sun-icon"></i>
                            <i data-lucide="moon" class="w-5 h-5 icon moon-icon"></i>
                       </div>
                    </div>
                </button>
                <button id="mobile-menu-button" class="md:hidden p-2">
                    <i data-lucide="menu" class="w-6 h-6"></i>
                </button>
            </div>
        </nav>
    </header>
    
    <div id="mobile-menu" class="hidden fixed inset-0 bg-[var(--bg-primary)]/95 backdrop-blur-3xl z-40 md:hidden">
        <div class="flex justify-end p-6">
            <button id="close-mobile-menu-button"><i data-lucide="x" class="w-8 h-8"></i></button>
        </div>
        <div class="flex flex-col items-center justify-center space-y-12 h-full text-3xl font-medium">
            <a href="#hero" class="mobile-menu-link">About</a>
            <a href="#projects" class="mobile-menu-link">Work</a>
            <a href="#contact" class="mobile-menu-link">Contact</a>
            <div class="pt-10">
               <button class="theme-toggle" aria-label="Toggle theme">
                     <div class="theme-switch">
                         <div class="theme-switch-thumb">
                             <i data-lucide="sun" class="w-5 h-5 icon sun-icon"></i>
                             <i data-lucide="moon" class="w-5 h-5 icon moon-icon"></i>
                         </div>
                     </div>
               </button>
            </div>
        </div>
    </div>

    <main class="container mx-auto px-8 pt-28 md:pt-40">

        <!-- Hero - now with more energy and circular avatar -->
        <section id="hero" class="text-center max-w-4xl mx-auto">
            <div class="relative w-40 h-40 md:w-48 md:h-48 rounded-full mx-auto mb-10 avatar-ring">
                <img id="user-avatar" src="https://placehold.co/144x144/e5e7eb/4b5563?text=Avatar" alt="User Avatar" class="w-full h-full rounded-full object-cover">
            </div>
            <h1 class="text-6xl md:text-7xl font-black tracking-[-0.04em] leading-none mb-6 reveal-on-scroll">
                Hi, I'm <span id="user-name"></span>
            </h1>
            <p id="user-bio" class="text-2xl md:text-3xl text-[var(--text-secondary)] max-w-2xl mx-auto mb-12 reveal-on-scroll"></p>
            <div class="reveal-on-scroll flex justify-center">
                <a id="explore-work-btn" href="#projects" class="sleek-btn py-4 px-10 text-xl inline-flex items-center gap-3">
                    Explore My Work
                    <i data-lucide="arrow-right" class="w-6 h-6"></i>
                </a>
            </div>
        </section>

        <section id="projects" class="pt-28 pb-20">
            <div class="max-w-2xl mx-auto text-center mb-16">
                <h2 class="text-4xl md:text-5xl font-semibold tracking-tighter reveal-on-scroll">Selected Work</h2>
                <p id="projects-subtitle" class="text-xl text-[var(--text-secondary)] mt-4 reveal-on-scroll"></p>
            </div>
            <div id="projects-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                <div id="loader" class="col-span-full flex justify-center items-center h-64">
                    <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-[var(--accent-primary)]"></div>
                </div>
            </div>
            <div class="mt-16 text-center">
                <a href="https://github.com/rajatkumar1011" target="_blank" rel="noopener noreferrer" 
                   class="inline-flex items-center gap-x-3 text-base font-medium text-[var(--text-secondary)] hover:text-[var(--accent-secondary)] transition-colors">
                    VIEW ALL ON GITHUB
                    <i data-lucide="external-link" class="w-5 h-5"></i>
                </a>
            </div>
            <div id="error-message" class="hidden col-span-full text-center text-red-500 p-8 bg-red-50 dark:bg-red-900/20 rounded-3xl mt-8"></div>
        </section>

        <section id="contact" class="py-20 rounded-3xl card-style text-center">
             <div class="max-w-2xl mx-auto px-6">
                <h2 class="text-4xl md:text-5xl font-semibold mb-4">Let's build something great together</h2>
                <p class="text-xl text-[var(--text-secondary)] mb-10">Always open to exciting opportunities, collaborations, or just a good conversation.</p>
                <a id="contact-footer-link" href="#" target="_blank" rel="noopener noreferrer" class="sleek-btn py-4 px-12 text-xl inline-flex items-center gap-3">
                    Get In Touch
                    <i data-lucide="send" class="w-6 h-6"></i>
                </a>
            </div>
        </section>

    </main>

    <footer id="page-footer" class="mt-24 pb-12 border-t border-[var(--border-color)]">
        <div class="container mx-auto px-8 text-center text-sm text-[var(--text-secondary)]">
            <div class="flex justify-center space-x-8 mb-6">
                 <a id="linkedin-link" href="#" target="_blank" rel="noopener noreferrer" class="hover:text-[var(--accent-secondary)] transition-colors">
                       <i data-lucide="linkedin" class="w-5 h-5"></i>
                 </a>
                 <a id="github-footer-link" href="#" target="_blank" rel="noopener noreferrer" class="hover:text-[var(--accent-secondary)] transition-colors">
                       <i data-lucide="github" class="w-5 h-5"></i>
                 </a>
            </div>
            <p>&copy; <span id="current-year"></span> <span id="footer-user-name"></span>. All Rights Reserved.</p>
        </div>
    </footer>

    <script>
        // --- CONFIGURATION ---
        const GITHUB_USERNAME = "rajatkumar1011";
        const LINKEDIN_URL = "https://www.linkedin.com/in/rajatkumar7/";
        const CONTACT_EMAIL_LINK = "https://mail.google.com/mail/u/0/?fs=1&to=contact@rajatkumar1.me&tf=cm";
        
        // --- DOM ELEMENTS ---
        const elements = {
            userName: document.getElementById('user-name'),
            footerUserName: document.getElementById('footer-user-name'),
            userBio: document.getElementById('user-bio'),
            userAvatar: document.getElementById('user-avatar'),
            projectsContainer: document.getElementById('projects-container'),
            loader: document.getElementById('loader'),
            errorMessage: document.getElementById('error-message'),
            currentYear: document.getElementById('current-year'),
            header: document.getElementById('header'),
            mobileMenuButton: document.getElementById('mobile-menu-button'),
            mobileMenu: document.getElementById('mobile-menu'),
            closeMobileMenuButton: document.getElementById('close-mobile-menu-button'),
            mobileMenuLinks: document.querySelectorAll('.mobile-menu-link'),
            linkedinLink: document.getElementById('linkedin-link'),
            githubFooterLink: document.getElementById('github-footer-link'),
            themeToggles: document.querySelectorAll('.theme-toggle'),
            projectsSubtitle: document.getElementById('projects-subtitle'),
            contactFooterLink: document.getElementById('contact-footer-link'),
            cursorGlow: document.getElementById('cursor-glow'),
        };

        // --- GITHUB API ---
        async function fetchGitHubAPI(endpoint) {
            try {
                const response = await fetch(`https://api.github.com/${endpoint}`);
                if (!response.ok) {
                    if (response.status === 403) console.warn(`GitHub API rate limit hit for ${endpoint}`);
                    return null;
                }
                return await response.json();
            } catch (error) {
                console.error(`Network error fetching ${endpoint}:`, error);
                return null;
            }
        }

        // --- UI RENDERING ---
        function populateUserInfo(userData) {
            if (!userData) return;
            const name = userData.name || userData.login;
            elements.userName.textContent = name;
            elements.footerUserName.textContent = name;
            elements.userAvatar.src = userData.avatar_url;
            elements.githubFooterLink.href = userData.html_url;
            elements.userAvatar.onerror = () => elements.userAvatar.src = 'https://placehold.co/144x144/e5e7eb/4b5563?text=Avatar';
        }

        function createProjectCards(repos) {
            elements.projectsContainer.innerHTML = '';
            if (!repos || repos.length === 0) {
                elements.projectsContainer.innerHTML = `<p class="col-span-full text-center text-[var(--text-secondary)] py-12">No public repositories found.</p>`;
                return;
            }

            repos.forEach((repo, index) => {
                const card = document.createElement('div');
                card.className = 'card-style p-7 rounded-3xl flex flex-col h-full';
                card.style.transitionDelay = `${index * 70}ms`;

                const language = repo.language ? `<span class="text-xs font-medium px-3 py-1 rounded-2xl bg-[var(--bg-tertiary)] border border-[var(--border-color)] text-[var(--accent-primary)]">${repo.language}</span>` : '';
                const deploymentUrl = repo.homepage || `https://rajatkumar1.me/${repo.name}`;

                card.innerHTML = `
                    <div class="flex justify-between items-start mb-4">
                        <h3 class="text-xl font-semibold">${repo.name}</h3>
                        <div class="flex items-center gap-x-4">
                            <a href="${deploymentUrl}" target="_blank" rel="noopener noreferrer" class="text-[var(--text-secondary)] hover:text-[var(--accent-secondary)]">
                                <i data-lucide="external-link" class="w-5 h-5"></i>
                            </a>
                            <a href="${repo.html_url}" target="_blank" rel="noopener noreferrer" class="text-[var(--text-secondary)] hover:text-[var(--accent-secondary)]">
                                <i data-lucide="github" class="w-5 h-5"></i>
                            </a>
                        </div>
                    </div>
                    <p class="text-[var(--text-secondary)] flex-1 mb-6 line-clamp-4">${repo.description || 'No description available.'}</p>
                    <div class="flex items-center justify-between text-xs mt-auto pt-4 border-t border-[var(--border-color)]">
                        <div class="flex items-center gap-x-5">
                            <div class="flex items-center gap-x-1"><i data-lucide="star" class="w-3.5 h-3.5"></i><span>${repo.stargazers_count}</span></div>
                            <div class="flex items-center gap-x-1"><i data-lucide="git-fork" class="w-3.5 h-3.5"></i><span>${repo.forks_count}</span></div>
                        </div>
                        ${language}
                    </div>
                `;
                elements.projectsContainer.appendChild(card);
            });

            document.querySelectorAll('.card-style').forEach(card => {
                card.onmousemove = e => {
                    const rect = card.getBoundingClientRect();
                    const x = e.clientX - rect.left;
                    const y = e.clientY - rect.top;
                    card.style.setProperty('--mouse-x', `${x}px`);
                    card.style.setProperty('--mouse-y', `${y}px`);
                };
            });
        }

        // --- TYPEWRITER ---
        function typeSingleLine(element, text) {
            if (element.dataset.typed) return;
            element.dataset.typed = 'true';
            element.textContent = '';
            element.classList.add('typing-cursor');
            let i = 0;
            function typeChar() {
                if (i < text.length) {
                    element.textContent += text.charAt(i++);
                    setTimeout(typeChar, 32);
                } else {
                    element.classList.remove('typing-cursor');
                }
            }
            typeChar();
        }

        // --- SCROLL ANIMATIONS ---
        function setupScrollAnimations() {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('is-visible');
                        if (entry.target.id === 'projects-subtitle') {
                            typeSingleLine(entry.target, "A selection of projects that showcase my skills and passion for development.");
                        }
                        observer.unobserve(entry.target);
                    }
                });
            }, { threshold: 0.15 });

            document.querySelectorAll('.reveal-on-scroll').forEach(el => observer.observe(el));
        }

        // --- EVENT HANDLERS ---
        function handleScroll() {
            elements.header.classList.toggle('header-scrolled', window.scrollY > 30);
        }
        
        function toggleMobileMenu() {
            elements.mobileMenu.classList.toggle('hidden');
        }

        function setTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('theme', theme);
        }

        function toggleTheme() {
            const current = document.documentElement.getAttribute('data-theme');
            setTheme(current === 'light' ? 'dark' : 'light');
        }

        // --- CURSOR GLOW ---
        function setupCursorGlow() {
            window.addEventListener('mousemove', (e) => {
                elements.cursorGlow.style.left = `${e.clientX}px`;
                elements.cursorGlow.style.top = `${e.clientY}px`;
            });
            
            document.querySelectorAll('a, button, .theme-switch, .card-style').forEach(el => {
                el.addEventListener('mouseenter', () => {
                    elements.cursorGlow.style.width = '640px';
                    elements.cursorGlow.style.height = '640px';
                });
                el.addEventListener('mouseleave', () => {
                    elements.cursorGlow.style.width = '520px';
                    elements.cursorGlow.style.height = '520px';
                });
            });
        }

        // --- INITIALIZATION ---
        async function init() {
            elements.currentYear.textContent = new Date().getFullYear();
            window.addEventListener('scroll', handleScroll);
            
            elements.mobileMenuButton.addEventListener('click', toggleMobileMenu);
            elements.closeMobileMenuButton.addEventListener('click', toggleMobileMenu);
            elements.mobileMenuLinks.forEach(link => link.addEventListener('click', toggleMobileMenu));
            elements.themeToggles.forEach(btn => btn.addEventListener('click', toggleTheme));
            
            setTheme(localStorage.getItem('theme') || 'dark');
            
            elements.linkedinLink.href = LINKEDIN_URL;
            elements.contactFooterLink.href = CONTACT_EMAIL_LINK;

            const userData = await fetchGitHubAPI(`users/${GITHUB_USERNAME}`);
            if (userData) {
                populateUserInfo(userData);
                typeSingleLine(elements.userBio, userData.bio || 'A passionate developer creating amazing things.');
            } else {
                populateUserInfo({ name: "Rajat Kumar", login: GITHUB_USERNAME });
                typeSingleLine(elements.userBio, 'A passionate developer creating amazing things.');
            }

            const reposData = await fetchGitHubAPI(`users/${GITHUB_USERNAME}/repos?sort=pushed&per_page=12`);
            elements.loader.style.display = 'none';
            
            if (reposData) {
                const excludedRepos = ['rajatkumar1011.github.io', 'python-gym'];
                const filteredRepos = reposData
                    .filter(repo => !repo.fork && !excludedRepos.includes(repo.name.toLowerCase()))
                    .slice(0, 9);
                
                createProjectCards(filteredRepos);
            } else {
                elements.errorMessage.classList.remove('hidden');
                elements.errorMessage.textContent = 'Could not load projects from GitHub. Please try again later.';
            }
            
            lucide.createIcons();
            setupScrollAnimations();
            setupCursorGlow();
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
